name: Quality and Playwright Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: TypeScript quality gate

    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate TypeScript
        run: npm run typecheck

  smoke:
    name: Chromium smoke tests

    needs:
      - quality

    runs-on: ubuntu-latest

    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Chromium smoke tests
        run: npm run test:smoke:chromium

      - name: Upload Chromium smoke artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: chromium-smoke-attempt-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

  regression:
    name: Regression - ${{ matrix.browser }}

    needs:
      - quality
      - smoke

    runs-on: ubuntu-latest

    timeout-minutes: 30

    strategy:
      fail-fast: false

      matrix:
        browser:
          - chromium
          - firefox
          - webkit

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install ${{ matrix.browser }}
        run: >
          npx playwright install
          --with-deps
          ${{ matrix.browser }}

      - name: Run ${{ matrix.browser }} regression
        run: >
          npm test --
          --project=${{ matrix.browser }}

      - name: Upload ${{ matrix.browser }} artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: regression-${{ matrix.browser }}-attempt-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14